<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Token Launch Timeline | Clawdy Research</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 0.5rem;
        }
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .filters {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .filter-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group label {
            font-weight: 600;
            margin-right: 0.5rem;
        }
        .filter-group input, .filter-group select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            padding: 0.5rem 1rem;
            color: #fff;
            font-size: 0.95rem;
        }
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            height: 500px;
        }
        .token-list {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
        }
        .token-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }
        .token-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .token-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .token-name {
            font-size: 1.3rem;
            font-weight: bold;
        }
        .token-symbol {
            color: #667eea;
            font-size: 1.1rem;
        }
        .token-mcap {
            font-size: 1.5rem;
            font-weight: bold;
            color: #10b981;
        }
        .token-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
        }
        .detail-label {
            font-size: 0.85rem;
            opacity: 0.6;
            margin-bottom: 0.25rem;
        }
        .detail-value {
            font-weight: 600;
        }
        .token-links {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        .token-links a {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .token-links a:hover {
            background: rgba(102, 126, 234, 0.4);
        }
        footer {
            text-align: center;
            padding: 2rem;
            opacity: 0.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🚀 Solana Token Launch Timeline</h1>
        <p>Tracking successful token launches since January 2025</p>
    </header>

    <div class="container">
        <div class="stats" id="stats"></div>

        <div class="filters">
            <div class="filter-group">
                <label>Min Market Cap:</label>
                <input type="number" id="minMcap" placeholder="$1M" min="0" step="1000000" value="1000000">
                
                <label>Min Volume:</label>
                <input type="number" id="minVolume" placeholder="$0" min="0" step="100000" value="0">
                
                <label>DEX:</label>
                <select id="dexFilter">
                    <option value="">All DEXs</option>
                    <option value="raydium">Raydium</option>
                    <option value="orca">Orca</option>
                    <option value="meteora">Meteora</option>
                </select>
                
                <button onclick="applyFilters()" style="background: #667eea; color: #fff; border: none; padding: 0.5rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: bold;">Apply Filters</button>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="timeline"></canvas>
        </div>

        <div class="token-list" id="tokenList"></div>
    </div>

    <footer>
        <p>🦞 Powered by Clawdy | Data updates every 5 minutes</p>
        <p>Data sources: DexScreener, GeckoTerminal, CoinGecko</p>
    </footer>

    <script>
        let allTokens = [];
        let filteredTokens = [];

        // Load data
        fetch('data.json')
            .then(r => r.json())
            .then(tokens => {
                allTokens = tokens;
                filteredTokens = tokens;
                renderStats();
                renderChart();
                renderTokenList();
            });

        function renderStats() {
            const stats = {
                total: filteredTokens.length,
                totalMcap: filteredTokens.reduce((sum, t) => sum + (t.current_mcap || 0), 0),
                totalVolume: filteredTokens.reduce((sum, t) => sum + (t.volume_24h || 0), 0),
                avgMcap: filteredTokens.length > 0 
                    ? filteredTokens.reduce((sum, t) => sum + (t.current_mcap || 0), 0) / filteredTokens.length 
                    : 0
            };

            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.total}</div>
                    <div class="stat-label">Total Tokens</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">$${(stats.totalMcap / 1e6).toFixed(1)}M</div>
                    <div class="stat-label">Total Market Cap</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">$${(stats.totalVolume / 1e6).toFixed(1)}M</div>
                    <div class="stat-label">24h Volume</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">$${(stats.avgMcap / 1e6).toFixed(2)}M</div>
                    <div class="stat-label">Avg Market Cap</div>
                </div>
            `;
        }

        function renderChart() {
            const ctx = document.getElementById('timeline').getContext('2d');
            
            new Chart(ctx, {
                type: 'bubble',
                data: {
                    datasets: [{
                        label: 'Token Launches',
                        data: filteredTokens.map(t => ({
                            x: new Date(t.launch_date * 1000),
                            y: t.current_mcap / 1e6,
                            r: Math.sqrt(t.volume_24h / 1e6) * 2,
                            token: t
                        })),
                        backgroundColor: 'rgba(102, 126, 234, 0.6)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => {
                                    const t = ctx.raw.token;
                                    return [
                                        `${t.symbol} (${t.name})`,
                                        `Market Cap: $${(t.current_mcap / 1e6).toFixed(2)}M`,
                                        `24h Volume: $${(t.volume_24h / 1e6).toFixed(2)}M`,
                                        `Launched: ${new Date(t.launch_date * 1000).toLocaleDateString()}`
                                    ];
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'day'
                            },
                            title: {
                                display: true,
                                text: 'Launch Date',
                                color: '#fff'
                            },
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Market Cap ($M)',
                                color: '#fff'
                            },
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });
        }

        function renderTokenList() {
            const list = document.getElementById('tokenList');
            list.innerHTML = '<h2 style="margin-bottom: 1rem;">All Tokens</h2>' +
                filteredTokens.map(t => `
                    <div class="token-card">
                        <div class="token-header">
                            <div>
                                <div class="token-name">${t.name}</div>
                                <div class="token-symbol">${t.symbol}</div>
                            </div>
                            <div class="token-mcap">$${(t.current_mcap / 1e6).toFixed(2)}M</div>
                        </div>
                        <div class="token-details">
                            <div class="detail-item">
                                <span class="detail-label">Launched</span>
                                <span class="detail-value">${new Date(t.launch_date * 1000).toLocaleDateString()}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">24h Volume</span>
                                <span class="detail-value">$${(t.volume_24h / 1e6).toFixed(2)}M</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Liquidity</span>
                                <span class="detail-value">$${(t.liquidity / 1e3).toFixed(1)}K</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">DEX</span>
                                <span class="detail-value">${t.dex}</span>
                            </div>
                        </div>
                        <div class="token-links">
                            <a href="${t.url}" target="_blank">📊 Chart</a>
                            ${t.twitter ? `<a href="${t.twitter}" target="_blank">🐦 Twitter</a>` : ''}
                            ${t.telegram ? `<a href="${t.telegram}" target="_blank">💬 Telegram</a>` : ''}
                            ${t.website ? `<a href="${t.website}" target="_blank">🌐 Website</a>` : ''}
                        </div>
                    </div>
                `).join('');
        }

        function applyFilters() {
            const minMcap = parseFloat(document.getElementById('minMcap').value) || 0;
            const minVolume = parseFloat(document.getElementById('minVolume').value) || 0;
            const dexFilter = document.getElementById('dexFilter').value;

            filteredTokens = allTokens.filter(t => {
                if (t.current_mcap < minMcap) return false;
                if (t.volume_24h < minVolume) return false;
                if (dexFilter && t.dex !== dexFilter) return false;
                return true;
            });

            renderStats();
            renderChart();
            renderTokenList();
        }
    </script>
</body>
</html>
