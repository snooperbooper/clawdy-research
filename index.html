<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Token Timeline | Clawdy Research</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            overflow-x: hidden;
        }
        
        header {
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
        }
        
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .controls {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .filter-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        
        .filter-group input, select {
            padding: 0.5rem 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
        }
        
        .btn {
            padding: 0.5rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Stats */
        .stats-bar {
            display: flex;
            gap: 2rem;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.03);
            justify-content: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 0.85rem;
            opacity: 0.7;
        }
        
        /* HORIZONTAL TIMELINE */
        .timeline-wrapper {
            padding: 3rem 0;
            overflow-x: auto;
            overflow-y: hidden;
        }
        
        .timeline-container {
            display: flex;
            align-items: center;
            min-height: 400px;
            position: relative;
            padding: 2rem 100px;
            width: max-content;
        }
        
        /* Horizontal line */
        .timeline-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                rgba(102, 126, 234, 0) 0%,
                rgba(102, 126, 234, 0.5) 10%,
                rgba(102, 126, 234, 0.5) 90%,
                rgba(102, 126, 234, 0) 100%
            );
            z-index: 0;
        }
        
        /* Token item */
        .token-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 2rem;
            position: relative;
            z-index: 1;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .token-item:hover {
            transform: translateY(-10px);
        }
        
        /* Token avatar */
        .token-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #667eea;
            overflow: hidden;
            background: rgba(10, 14, 39, 0.95);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
            position: relative;
        }
        
        .token-item:hover .token-avatar {
            border-width: 4px;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.8);
            transform: scale(1.1);
        }
        
        .token-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .token-icon-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* Token info card (shows on hover) */
        .token-info {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(10, 14, 39, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            padding: 1rem;
            min-width: 250px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        
        .token-item:hover .token-info {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }
        
        .token-info-header {
            margin-bottom: 0.75rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .token-symbol {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }
        
        .token-name {
            font-size: 0.85rem;
            opacity: 0.7;
        }
        
        .token-stats {
            display: grid;
            gap: 0.5rem;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        
        .stat-label {
            opacity: 0.6;
        }
        
        .stat-value {
            font-weight: 600;
            color: #10b981;
        }
        
        /* Date label */
        .token-date {
            margin-top: 0.75rem;
            font-size: 0.75rem;
            color: #667eea;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
        }
        
        /* Links in hover card */
        .token-links {
            margin-top: 0.75rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .token-link {
            padding: 0.25rem 0.5rem;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 4px;
            color: #667eea;
            text-decoration: none;
            font-size: 0.75rem;
        }
        
        /* Scroll hint */
        .scroll-hint {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(102, 126, 234, 0.9);
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-10px); }
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🚀 Solana Token Launch Timeline</h1>
        <p class="subtitle" id="subtitle">Loading tokens...</p>
    </header>

    <div class="controls">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" placeholder="Search tokens...">
        </div>
        
        <div class="filter-group">
            <label>From:</label>
            <input type="date" id="dateFrom" value="2025-01-01">
        </div>
        
        <div class="filter-group">
            <label>To:</label>
            <input type="date" id="dateTo">
        </div>
        
        <div class="filter-group">
            <label>DEX:</label>
            <select id="dexFilter">
                <option value="">All</option>
                <option value="raydium">Raydium</option>
                <option value="orca">Orca</option>
                <option value="meteora">Meteora</option>
            </select>
        </div>
        
        <button class="btn" onclick="applyFilters()">Apply</button>
    </div>

    <div class="stats-bar" id="stats"></div>

    <div class="timeline-wrapper">
        <div class="loading" id="loading">Loading timeline...</div>
        <div class="timeline-container" id="timeline">
            <div class="timeline-line"></div>
        </div>
    </div>

    <div class="scroll-hint">← Scroll to explore →</div>

    <script>
        let allTokens = [];
        let filteredTokens = [];

        document.getElementById('dateTo').value = new Date().toISOString().split('T')[0];

        fetch('data.json')
            .then(r => r.json())
            .then(tokens => {
                allTokens = tokens;
                filteredTokens = tokens;
                renderTimeline();
                renderStats();
                document.getElementById('loading').style.display = 'none';
                document.querySelector('.subtitle').textContent = `Tracking ${tokens.length} successful launches since January 2025`;
            });

        function renderStats() {
            const total = filteredTokens.reduce((sum, t) => sum + (t.current_mcap || 0), 0);
            const vol = filteredTokens.reduce((sum, t) => sum + (t.volume_24h || 0), 0);

            document.getElementById('stats').innerHTML = `
                <div class="stat">
                    <div class="stat-value">${filteredTokens.length}</div>
                    <div class="stat-label">Tokens</div>
                </div>
                <div class="stat">
                    <div class="stat-value">$${(total / 1e9).toFixed(1)}B</div>
                    <div class="stat-label">Total Mcap</div>
                </div>
                <div class="stat">
                    <div class="stat-value">$${(vol / 1e6).toFixed(1)}M</div>
                    <div class="stat-label">24h Volume</div>
                </div>
            `;
        }

        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            const line = timeline.querySelector('.timeline-line');
            timeline.innerHTML = '';
            timeline.appendChild(line);

            filteredTokens.forEach(token => {
                const item = document.createElement('div');
                item.className = 'token-item';
                
                const date = new Date(token.launch_date * 1000);
                const age = Math.floor((Date.now() - date) / (1000 * 60 * 60 * 24));
                
                item.innerHTML = `
                    <div class="token-avatar">
                        <img src="https://dd.dexscreener.com/ds-data/tokens/solana/${token.address}.png" 
                             onerror="this.parentElement.innerHTML='<div class=\\"token-icon-fallback\\">${token.symbol.charAt(0)}</div>'" 
                             alt="${token.symbol}"/>
                    </div>
                    
                    <div class="token-date">
                        ${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' })}
                    </div>
                    
                    <div class="token-info">
                        <div class="token-info-header">
                            <div class="token-symbol">${token.symbol}</div>
                            <div class="token-name">${token.name}</div>
                        </div>
                        
                        <div class="token-stats">
                            <div class="stat-row">
                                <span class="stat-label">Mcap:</span>
                                <span class="stat-value">$${(token.current_mcap / 1e6).toFixed(2)}M</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">ATH:</span>
                                <span class="stat-value">$${((token.ath_mcap || token.current_mcap) / 1e6).toFixed(2)}M</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">24h Vol:</span>
                                <span class="stat-value">$${((token.volume_24h || 0) / 1e6).toFixed(2)}M</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Liquidity:</span>
                                <span class="stat-value">$${((token.liquidity || 0) / 1e3).toFixed(0)}K</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Age:</span>
                                <span class="stat-value">${age} days</span>
                            </div>
                        </div>
                        
                        <div class="token-links">
                            <a href="${token.url}" target="_blank" class="token-link" onclick="event.stopPropagation()">📊 Chart</a>
                            ${token.twitter ? `<a href="${token.twitter}" target="_blank" class="token-link" onclick="event.stopPropagation()">🐦 X</a>` : ''}
                            ${token.telegram ? `<a href="${token.telegram}" target="_blank" class="token-link" onclick="event.stopPropagation()">💬 TG</a>` : ''}
                        </div>
                    </div>
                `;
                
                item.onclick = () => window.open(token.url, '_blank');
                timeline.appendChild(item);
            });
        }

        function applyFilters() {
            const search = document.getElementById('search').value.toLowerCase();
            const from = new Date(document.getElementById('dateFrom').value).getTime() / 1000;
            const to = new Date(document.getElementById('dateTo').value).getTime() / 1000 + 86400;
            const dex = document.getElementById('dexFilter').value;

            filteredTokens = allTokens.filter(t => {
                if (search && !t.symbol.toLowerCase().includes(search) && !t.name.toLowerCase().includes(search)) return false;
                if (t.launch_date < from || t.launch_date > to) return false;
                if (dex && t.dex.toLowerCase() !== dex.toLowerCase()) return false;
                return true;
            });

            renderTimeline();
            renderStats();
        }

        document.getElementById('search').addEventListener('input', applyFilters);
    </script>
</body>
</html>
